name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  legacy-migration-tool:
    name: Legacy migration tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tools/legacy-migration/package-lock.json
      - run: npm ci
        working-directory: tools/legacy-migration
      - run: npm run typecheck
        working-directory: tools/legacy-migration
      - run: npm test
        working-directory: tools/legacy-migration
      - run: npm run preflight -- --fixture fixtures/v1-complete.json --dry-run
        working-directory: tools/legacy-migration

  v2-foundation:
    name: V2 foundation
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DEPLOY_ENV: test
      RELEASE_SHA: ${{ github.sha }}
      DATABASE_URL: postgresql://bliver:bliver@localhost:5432/bliver_v2_test
      SESSION_SECRET: ci-only-session-secret-for-v2-foundation-tests
      V2_PERF_MODE: release
      V2_LIGHTHOUSE_REPORT: .artifacts/lighthouse-v2.json
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: bliver_v2_test
          POSTGRES_USER: bliver
          POSTGRES_PASSWORD: bliver
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bliver -d bliver_v2_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run db:v2:migrate
      - run: npm run verify:v2-foundation
      - run: npx playwright test
      - run: npm run perf:v2:browser-evidence
      - run: npm run build --workspace @bliver/web
      - run: npm run lighthouse:v2
      - run: npm run perf:v2
      - run: npm run security:v2
      - run: npm run cap:v2:smoke
      - run: git diff --check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v2-hardening-evidence
          path: |
            .artifacts/lighthouse-v2.json
            .artifacts/browser-performance/
            test-results/
          if-no-files-found: error

  visual-baselines:
    name: Windows visual baselines
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install chromium
      - run: npx playwright test apps/web/e2e/visual-baselines.spec.ts --project=mobile-390x844

  release:
    name: V2 release candidate build
    runs-on: ubuntu-latest
    needs: [v2-foundation, visual-baselines]
    env:
      RELEASE_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:release-tools
      - run: npm run render-build
      - run: npm run release:v2:verify-candidate
      - run: test -f apps/web/dist/index.html
      - run: test -f apps/api/dist/bootstrap/server.js
