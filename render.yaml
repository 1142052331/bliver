services:
  - type: web
    name: bliver
    runtime: node
    plan: free
    autoDeploy: false
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run render-build
    preDeployCommand: npm run release:v2:predeploy
    startCommand: npm start
    healthCheckPath: /readyz
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: NODE_ENV
        value: production
      - key: DEPLOY_ENV
        value: production
      - key: RELEASE_SHA
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: VITE_MAP_STYLE_URL
        sync: false
      - key: VITE_MAP_ATTRIBUTION_JSON
        sync: false
      - key: MAP_PROVIDER_EMERGENCY
        sync: false
      - key: MAP_PROVIDER_EMERGENCY_EXPIRES_AT
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
