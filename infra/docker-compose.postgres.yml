services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bliver_v2}
      POSTGRES_USER: ${POSTGRES_USER:-bliver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bliver_local}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - bliver-v2-postgres:/var/lib/postgresql/data

volumes:
  bliver-v2-postgres:
